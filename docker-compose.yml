services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chainops
      POSTGRES_USER: chainops
      POSTGRES_PASSWORD: chainops
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainops -d chainops"]
      interval: 10s
      timeout: 3s
      retries: 5
  api:
    build: .
    environment:
      PORT: "4317"
      CHAINOPS_DATABASE_URL: "postgres://chainops:chainops@postgres:5432/chainops"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4317:4317"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4317/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
