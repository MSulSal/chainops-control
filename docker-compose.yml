services:
  api:
    build: .
    environment:
      PORT: "4317"
      CHAINOPS_DATA_PATH: "/app/data/audit-log.json"
    ports:
      - "4317:4317"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4317/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
