name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Run seeded demo smoke harness
        run: npm run smoke:demo

      - name: Boot API container and rerun live smoke harness
        run: docker compose up -d api

      - name: Run runtime health, readiness, and seeded smoke checks
        run: npm run smoke:runtime

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs api postgres

      - name: Stop compose stack
        if: always()
        run: docker compose down -v

      - name: Build reviewer workspace
        run: npm run build:web
