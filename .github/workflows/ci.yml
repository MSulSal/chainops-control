name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: chainops
          POSTGRES_USER: chainops
          POSTGRES_PASSWORD: chainops
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U chainops -d chainops"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm test
        env:
          CHAINOPS_DATABASE_URL: postgres://chainops:chainops@127.0.0.1:5432/chainops
